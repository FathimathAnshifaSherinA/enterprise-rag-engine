<template>
    <lightning-card title="AI Case Resolution Engine" icon-name="standard:einstein">
        <div class="slds-p-around_medium">

            <lightning-button
                variant="brand"
                label="Generate AI Reply"
                icon-name="utility:sparkles"
                onclick={handleGenerate}
                disabled={isLoading}>
            </lightning-button>

            <template if:true={isLoading}>
                <div class="slds-m-top_medium">
                    <lightning-spinner
                        alternative-text="Generating..."
                        size="small">
                    </lightning-spinner>
                    <p>Searching knowledge base and generating reply...</p>
                </div>
            </template>

            <template if:true={generatedReply}>
                <div class="slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">
                        ✉️ Suggested Email Draft
                    </h3>

                    <lightning-textarea
                        value={generatedReply}
                        onchange={handleReplyEdit}
                        rows="10"
                        label="Review and edit before sending">
                    </lightning-textarea>

                    <div class="slds-m-top_small slds-button-group">
                        <lightning-button
                            variant="success"
                            label="Send as Email"
                            icon-name="utility:send"
                            disabled={isSending}
                            onclick={handleSendEmail}>
                        </lightning-button>

                        <lightning-button
                            variant="neutral"
                            label="Copy to Clipboard"
                            onclick={handleCopy}>
                        </lightning-button>
                    </div>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-m-top_medium">
                    <p style="color:red">{errorMessage}</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
